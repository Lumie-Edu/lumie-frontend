name: Generate Documentation

on:
  workflow_dispatch:

concurrency:
  group: docs-gen-frontend
  cancel-in-progress: true

jobs:
  generate-docs:
    uses: Lumie-Edu/lumie-document/.github/workflows/generate-docs-reusable.yml@main
    with:
      source-repo: lumie-frontend
      docs-section: frontend
      repomix-ignore: '**/node_modules/**,**/.next/**,**/dist/**,**/*.lock'
    secrets:
      gemini-api-key: ${{ secrets.GOOGLE_API_KEY }}
      docs-github-token: ${{ secrets.DOCS_GITHUB_TOKEN }}
